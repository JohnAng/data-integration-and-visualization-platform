server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: serve index.html for any unknown path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the backend container.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Expose backend docs through the same origin to avoid CORS dances.
    location = /docs {
        proxy_pass http://backend:8000/docs;
    }
    location = /redoc {
        proxy_pass http://backend:8000/redoc;
    }
    location = /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
    }
    location = /health {
        proxy_pass http://backend:8000/health;
    }

    # Aggressive cache for fingerprinted assets, no cache for the HTML shell.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
